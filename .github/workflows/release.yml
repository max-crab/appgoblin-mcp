name: Build .mcpb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Derive artifact name
        id: name
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="$(jq -r .version manifest.json)+$(git rev-parse --short HEAD)"
          fi
          echo "file=appgoblin-mcp-${version}.mcpb" >> "$GITHUB_OUTPUT"

      - name: Pack .mcpb
        run: mcpb pack . "${{ steps.name.outputs.file }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.file }}
          path: ${{ steps.name.outputs.file }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.name.outputs.file }}
          generate_release_notes: true
